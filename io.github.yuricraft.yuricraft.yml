app-id: io.github.yuricraft.yuricraft
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: 4jcraft
finish-args:
  - '--share=network'
  - '--socket=x11'
  - '--socket=wayland'
  - '--socket=fallback-x11'
  - '--socket=pulseaudio'
  - '--device=dri'

modules:
  - name: 4jcraft
    buildsystem: meson
    builddir: false
    config-opts:
      - '--prefix=/app/share'
    modules:
      - shared-modules/glu/glu-9.json
      - shiggy.yml
    post-install:
      - install -Dm755 /app/share/Minecraft.Client /app/bin/Minecraft.Client
    sources:
      - type: git
        url: 'https://github.com/4jcraft/4jcraft'
        commit: 22d814ccaff577b9a50893031e3265618c6bbf86

  - name: scripts
    buildsystem: simple
    build-commands:
      - install -Dm755 4jcraft-wrapper.sh /app/bin/4jcraft
      - install -Dm644 io.github.yuricraft.yuricraft.png /app/share/icons/hicolor/128x128/apps/io.github.yuricraft.yuricraft.png
      - install -Dm644 io.github.yuricraft.yuricraft.desktop /app/share/applications/${FLATPAK_ID}.desktop
      - install -Dm644 $FLATPAK_ID.metainfo.xml /app/share/metainfo/$FLATPAK_ID.appdata.xml

    sources:
      - type: script
        dest-filename: 4jcraft-wrapper.sh
        commands:
          - cd /app/share
          - /app/bin/Minecraft.Client "$@"
      - type: file
        path: io.github.yuricraft.yuricraft.png
      - type: file
        path: io.github.yuricraft.yuricraft.desktop
      - type: file
        path: io.github.yuricraft.yuricraft.metainfo.xml
