app-id: org.lce4jcraft.minecraft
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk

finish-args:
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri

command: minecraft

modules:
  - name: glfw
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_SHARED_LIBS:BOOL=ON
      - -DGLFW_BUILD_EXAMPLES:BOOL=OFF
      - -DGLFW_BUILD_TESTS:BOOL=OFF
      - -DGLFW_BUILD_DOCS:BOOL=OFF
    sources:
      - type: archive
        url: https://github.com/glfw/glfw/releases/download/3.4/glfw-3.4.zip
        sha256: b5ec004b2712fd08e8861dc271428f048775200a2df719ccf575143ba749a3e9

  - name: build_minecraft
    buildsystem: meson
    builddir: true
    modules:
      - shared-modules/glu/glu-9.json
    sources:
      - type: git
        url: https://github.com/4jcraft/4jcraft
        branch: feat/restore-java-gui

  - name: wrapper
    buildsystem: simple
    build-commands:
      - install -Dm755 minecraft.sh /app/bin/minecraft
    sources:
      - type: script
        dest-filename: minecraft.sh
        commands:
          - cd /app && ./Minecraft.Client "$@"

  - name: install_desktop_entry
    buildsystem: simple
    build-commands:
    - install -Dm644 org.lce4jcraft.minecraft.desktop /app/share/applications/${FLATPAK_ID}.desktop
    sources:
      - type: file
        path: org.lce4jcraft.minecraft.desktop
